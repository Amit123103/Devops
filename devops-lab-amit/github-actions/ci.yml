name: DevOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository source files
      uses: actions/checkout@v3

    - name: Set up Java Environment
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build Java Package and Run Tests
      run: mvn clean package
      working-directory: ./devops-lab-amit/maven-app

    - name: Build Docker Image
      run: docker build -t amit-node-app:latest ./devops-lab-amit/docker
